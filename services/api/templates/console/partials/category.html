<div data-category data-removable class="border border-gray-200 bg-gray-50 rounded p-3">
    <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-medium text-gray-500 uppercase">Category</span>
        <button type="button" onclick="removeElement(this)" class="text-gray-400 hover:text-red-500 text-xs">&times;</button>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-2">
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Name</label>
            <input data-field="cat-name" type="text" value="{{ cat_name }}" placeholder="e.g. topic"
                class="w-full rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Consensus</label>
            <select data-field="cat-consensus" class="w-full rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                <option value="top_k:2" {% if category.consensus == "top_k:2" %}selected{% endif %}>Top-K (k=2)</option>
                <option value="top_k:3" {% if category.consensus == "top_k:3" %}selected{% endif %}>Top-K (k=3)</option>
                <option value="top_k:5" {% if category.consensus == "top_k:5" %}selected{% endif %}>Top-K (k=5)</option>
                <option value="average" {% if category.consensus == "average" %}selected{% endif %}>Average</option>
                <option value="majority" {% if category.consensus == "majority" %}selected{% endif %}>Majority</option>
                <option value="at_least_one" {% if category.consensus == "at_least_one" %}selected{% endif %}>At Least One</option>
                <option value="unanimous" {% if category.consensus == "unanimous" %}selected{% endif %}>Unanimous</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Weight</label>
            <input data-field="cat-weight" type="number" value="{{ category.weight }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-0.5">Threshold</label>
            <input data-field="cat-threshold" type="number" value="{{ category.threshold }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
    </div>

    <div class="mt-2">
        <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-medium text-gray-500">Labels</span>
            <button type="button"
                hx-post="/console/label"
                hx-target="next .labels-container"
                hx-swap="beforeend"
                class="text-xs px-1.5 py-0.5 text-indigo-600 border border-indigo-200 rounded hover:bg-indigo-50">
                + Label
            </button>
        </div>
        <div class="labels-container space-y-2">
            {% for (label_name, label) in category.labels.iter() %}
                {% include "console/partials/label.html" %}
            {% endfor %}
        </div>
    </div>
</div>
