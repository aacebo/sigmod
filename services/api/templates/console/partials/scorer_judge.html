<div data-scorer data-scorer-type="judge" data-removable class="border border-purple-200 bg-white rounded-lg p-4 shadow-sm">
    <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-purple-700 uppercase tracking-wide">Judge</span>
        <button type="button" onclick="removeElement(this)" class="text-gray-400 hover:text-red-500 text-sm">&times; Remove</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Model</label>
            <input data-field="model" type="text" value="{{ judge.model }}"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500" />
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Name</label>
            <input data-field="name" type="text" value="{{ judge.name }}" placeholder="Judge name (min 2 chars)" required
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500" />
        </div>
        <div class="col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">Access Token</label>
            <input data-field="access-token" type="password" value="{{ judge.access_token }}" placeholder="API key for LLM provider"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500" />
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Consensus</label>
            <select data-field="consensus" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500">
                <option value="top_k:2" {% if judge.consensus == "top_k:2" %}selected{% endif %}>Top-K (k=2)</option>
                <option value="top_k:3" {% if judge.consensus == "top_k:3" %}selected{% endif %}>Top-K (k=3)</option>
                <option value="top_k:5" {% if judge.consensus == "top_k:5" %}selected{% endif %}>Top-K (k=5)</option>
                <option value="average" {% if judge.consensus == "average" %}selected{% endif %}>Average</option>
                <option value="majority" {% if judge.consensus == "majority" %}selected{% endif %}>Majority</option>
                <option value="at_least_one" {% if judge.consensus == "at_least_one" %}selected{% endif %}>At Least One</option>
                <option value="unanimous" {% if judge.consensus == "unanimous" %}selected{% endif %}>Unanimous</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Weight</label>
            <input data-field="weight" type="number" value="{{ judge.weight }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500" />
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Threshold</label>
            <input data-field="threshold" type="number" value="{{ judge.threshold }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500" />
        </div>
        <div class="col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">Prompt (optional)</label>
            <textarea data-field="prompt" rows="2" placeholder="Custom system prompt for the judge..."
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-purple-500">{{ judge.prompt }}</textarea>
        </div>
    </div>

    <div class="mt-3">
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-gray-700">Criteria</span>
            <button type="button"
                hx-post="/console/criterion"
                hx-target="next .criteria-container"
                hx-swap="beforeend"
                class="text-xs px-2 py-1 text-purple-600 border border-purple-300 rounded hover:bg-purple-50">
                + Criterion
            </button>
        </div>
        <div class="criteria-container space-y-3">
            {% for criterion in judge.criteria.iter() %}
                {% include "console/partials/criterion.html" %}
            {% endfor %}
        </div>
    </div>
</div>
