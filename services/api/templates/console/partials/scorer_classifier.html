<div data-scorer data-scorer-type="classifier" data-removable class="border border-indigo-200 bg-white rounded-lg p-4 shadow-sm">
    <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-indigo-700 uppercase tracking-wide">Classifier</span>
        <button type="button" onclick="removeElement(this)" class="text-gray-400 hover:text-red-500 text-sm">&times; Remove</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Model</label>
            <input data-field="model" type="text" value="{{ classifier.model }}"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Consensus</label>
            <select data-field="consensus" class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
                <option value="top_k:2" {% if classifier.consensus == "top_k:2" %}selected{% endif %}>Top-K (k=2)</option>
                <option value="top_k:3" {% if classifier.consensus == "top_k:3" %}selected{% endif %}>Top-K (k=3)</option>
                <option value="top_k:5" {% if classifier.consensus == "top_k:5" %}selected{% endif %}>Top-K (k=5)</option>
                <option value="average" {% if classifier.consensus == "average" %}selected{% endif %}>Average</option>
                <option value="majority" {% if classifier.consensus == "majority" %}selected{% endif %}>Majority</option>
                <option value="at_least_one" {% if classifier.consensus == "at_least_one" %}selected{% endif %}>At Least One</option>
                <option value="unanimous" {% if classifier.consensus == "unanimous" %}selected{% endif %}>Unanimous</option>
            </select>
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Weight</label>
            <input data-field="weight" type="number" value="{{ classifier.weight }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Threshold</label>
            <input data-field="threshold" type="number" value="{{ classifier.threshold }}" min="0" max="1" step="0.05"
                class="w-full rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
    </div>

    <div class="mt-3">
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium text-gray-700">Categories</span>
            <button type="button"
                hx-post="/console/category"
                hx-target="next .categories-container"
                hx-swap="beforeend"
                class="text-xs px-2 py-1 text-indigo-600 border border-indigo-300 rounded hover:bg-indigo-50">
                + Category
            </button>
        </div>
        <div class="categories-container space-y-3">
            {% for (cat_name, category) in classifier.categories.iter() %}
                {% include "console/partials/category.html" %}
            {% endfor %}
        </div>
    </div>
</div>
