<div data-label data-removable class="border border-gray-200 bg-white rounded p-2">
    <div class="flex items-center justify-between mb-1">
        <span class="text-xs text-gray-400">Label</span>
        <button type="button" onclick="removeElement(this)" class="text-gray-400 hover:text-red-500 text-xs">&times;</button>
    </div>
    <div class="grid grid-cols-4 gap-2">
        <div>
            <input data-field="label-name" type="text" value="{{ label_name }}" placeholder="Name"
                class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <input data-field="label-weight" type="number" value="{{ label.weight }}" min="0" max="1" step="0.05" placeholder="Weight"
                class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <input data-field="label-threshold" type="number" value="{{ label.threshold }}" min="0" max="1" step="0.05" placeholder="Threshold"
                class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
            <input data-field="label-description" type="text" value="{{ label.description.as_deref().unwrap_or_default() }}" placeholder="Description (opt)"
                class="w-full rounded border border-gray-300 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500" />
        </div>
    </div>
</div>
